<svg width="620" height="150" viewBox="0 0 620 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NI-YU TEX INTERNATIONAL logo">
  <!-- Monogram mark -->
  <g>
    <rect x="6" y="6" width="120" height="138" rx="10" fill="none" stroke="#1A1D6D" stroke-width="6"/>
    <!-- Left vertical stem -->
    <rect x="30" y="26" width="15" height="98" fill="#1A1D6D"/>
    <!-- Right vertical stem -->
    <rect x="87" y="26" width="15" height="98" fill="#1A1D6D"/>
    <!-- Cross bar (H) -->
    <rect x="45" y="68" width="42" height="14" fill="#1A1D6D"/>
    <!-- Leaf / N curve threading through -->
    <path d="M45 26 C 20 55, 78 70, 60 118 C 92 92, 40 74, 66 26 Z" fill="none" stroke="#1A1D6D" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Wordmark -->
  <text x="150" y="82" font-family="'Arial Black', Arial, Helvetica, sans-serif" font-weight="900" font-size="72" letter-spacing="2" fill="#1A1D6D">NI-YU TEX</text>
  <text x="152" y="126" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="30" letter-spacing="14" fill="#3A3F4A">INTERNATIONAL</text>
</svg>
